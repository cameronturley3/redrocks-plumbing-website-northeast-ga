document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

255,255,0.7);font-weight:500;\">Northeast Georgia<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Bottom bar -->\n    <div style=\"border-top:1px solid rgba(255,255,255,0.1);padding-top:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;\">\n      <div style=\"font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;\">© 2026 RedRocks Plumbing · All Rights Reserved · GA Plumbing License<\u002Fdiv>\n      <div style=\"display:flex;gap:20px;\">\n        <a href=\"#contact\" style=\"font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;transition:color 0.15s;\" style-hover=\"color:#fff;\">Privacy Policy<\u002Fa>\n        <a href=\"#contact\" style=\"font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;transition:color 0.15s;\" style-hover=\"color:#fff;\">Terms<\u002Fa>\n        <a href=\"#contact\" style=\"font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;transition:color 0.15s;\" style-hover=\"color:#fff;\">Sitemap<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280 },\n  &quot;city&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Toccoa&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;phone&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;(678) 386-9330&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    isMobile: false,\n    mobileOpen: false,\n    activeStep: 1,\n    form: { name: '', email: '', phone: '', address: '', message: '' },\n    submitted: false\n  };\n\n  componentDidMount() {\n    const check = () => this.setState({ isMobile: window.innerWidth < 920 });\n    check();\n    this._resize = check;\n    window.addEventListener('resize', this._resize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._resize);\n  }\n\n  toggleMobile = () => this.setState(s => ({ mobileOpen: !s.mobileOpen }));\n  closeMobile = () => this.setState({ mobileOpen: false });\n  setStep = (n) => () => this.setState({ activeStep: n });\n\n  handleField = (f) => (e) => {\n    const v = e.target.value;\n    this.setState(s => ({ form: { ...s.form, [f]: v } }));\n  };\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    this.setState({ submitted: true });\n  };\n\n  renderVals() {\n    const { isMobile, mobileOpen, activeStep, form, submitted } = this.state;\n\n    const btnBase = {\n      flex: '1', padding: '14px 16px', border: 'none', cursor: 'pointer',\n      fontFamily: \"'Plus Jakarta Sans',sans-serif\", fontSize: '14px', fontWeight: '700',\n      transition: 'background 0.2s, color 0.2s'\n    };\n    const btnActive = { background: '#cc2929', color: '#fff' };\n    const btnInactive = { background: 'transparent', color: '#888' };\n\n    const indBase = { width: '32px', height: '4px', borderRadius: '2px', transition: 'background 0.2s' };\n\n    const steps = [\n      {\n        title: 'Schedule Your Service',\n        desc: \"Call us at (678) 386-9330 or book online. We confirm your appointment and send a photo of your technician so you know who to expect at the door. RedRocks never charges extra for after-hour or weekend emergency calls — ever.\",\n        imgLabel: '[ insert photo:\\nscheduling / phone call ]'\n      },\n      {\n        title: 'Get Your Repair Done Right',\n        desc: \"We diagnose the problem and present clear, upfront pricing options before any work begins. Our plumber lays down protective drop cloths, wears shoe covers, performs the repair, and leaves your home clean. If we don't fix it, we keep coming back until we do.\",\n        imgLabel: '[ insert photo:\\ntechnician at work ]'\n      },\n      {\n        title: 'We Follow Up With You',\n        desc: \"After your service we send a follow-up to make sure everything is working perfectly. Your satisfaction is our reputation. If anything isn't right, let us know and we'll make it right — that's the RedRocks guarantee.\",\n        imgLabel: '[ insert photo:\\nhappy customer ]'\n      }\n    ];\n\n    return {\n      mobileOpen,\n      notSubmitted: !submitted,\n      submitted,\n      navWrapStyle: {\n        display: isMobile ? 'none' : 'flex',\n        flex: '1', justifyContent: 'space-evenly', alignItems: 'center'\n      },\n      hamStyle: {\n        display: isMobile ? 'flex' : 'none',\n        background: 'none', border: 'none', cursor: 'pointer',\n        padding: '4px', alignItems: 'center'\n      },\n      step1Style: { ...btnBase, ...(activeStep === 1 ? btnActive : btnInactive) },\n      step2Style: { ...btnBase, ...(activeStep === 2 ? btnActive : btnInactive) },\n      step3Style: { ...btnBase, ...(activeStep === 3 ? btnActive : btnInactive) },\n      step1IndStyle: { ...indBase, background: activeStep === 1 ? '#cc2929' : '#c8cdd8' },\n      step2IndStyle: { ...indBase, background: activeStep === 2 ? '#cc2929' : '#c8cdd8' },\n      step3IndStyle: { ...indBase, background: activeStep === 3 ? '#cc2929' : '#c8cdd8' },\n      stepImgLabel: steps[activeStep - 1].imgLabel,\n      stepTitle: steps[activeStep - 1].title,\n      stepDesc: steps[activeStep - 1].desc,\n      stepNum: activeStep,\n      toggleMobile: this.toggleMobile,\n      closeMobile: this.closeMobile,\n      goStep1: this.setStep(1),\n      goStep2: this.setStep(2),\n      goStep3: this.setStep(3),\n      onName: this.handleField('name'),\n      onEmail: this.handleField('email'),\n      onPhone: this.handleField('phone'),\n      onAddress: this.handleField('address'),\n      onMessage: this.handleField('message'),\n      handleSubmit: this.handleSubmit,\n      nameVal: form.name,\n      emailVal: form.email,\n      phoneVal: form.phone,\n      addressVal: form.address,\n      messageVal: form.message,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbo
